<!DOCTYPE html>
<html>
<head>
    <title>Styled Image Example</title>

    <style>
        body{
            text-align: center;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        img{
            width: 600px;
            height: 600px;
            border: 5px solid black;
            border-radius: 15px;
            box-shadow: 0px 5px 15px gray;
            padding: 5px;
            margin-top: 20px;
        }

        h2{
            color: darkblue;
        }
    </style>

</head>
<body>

<h2>Displaying a Styled Image</h2>

<img src="SIT-Tumkur.webp" alt="Sample Image">

</body>
</html>
