<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .profile-card{
            width: 300px;
            background: white;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px gray;
        }

        .profile-card img{
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #333;
            object-fit: cover;
        }

        .profile-card h2{
            margin: 10px 0 5px;
            color: darkblue;
        }

        .profile-card p{
            color: gray;
            font-size: 16px;
        }
    </style>

</head>
<body>

<h1>Profile Card</h1>

<div class="profile-card">
    <img src="SIT-Tumkur.webp" alt="Profile Photo">
    <h2>ram</h2>
    <p>Computer Science Student</p>
    <p>SIT Tumkur</p>
    <p>section A</p>
</div>

</body>
</html>
