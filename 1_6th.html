<!DOCTYPE html>
<html>
<head>
<title>Sum of Natural Numbers</title>
</head>
<body>

<h2>Sum of First 10 Natural Numbers</h2>

<script>
let i = 1;
let sum = 0;

while (i <= 10) {
    sum = sum + i;
    i++;
}

document.write("The sum of first 10 natural numbers is: " + sum);
</script>

</body>
</html>
