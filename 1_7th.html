<!DOCTYPE html>
<html>
<head>
<title>Break and Continue Example</title>
</head>
<body>

<h2>Numbers from 1 to 20</h2>

<script>
for (let i = 1; i <= 20; i++) {

    if (i == 15) {
        break;
    }

    if (i % 3 == 0) {
        continue;
    }

    document.write(i + "<br>");
}
</script>

</body>
</html>
