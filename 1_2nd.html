<!DOCTYPE html>
<html>
<head>
<title>Odd or Even Number</title>
</head>
<body>

<h2>Check Whether a Number is Odd or Even</h2>

<script>
let num = prompt("Enter a number:");
num = Number(num);

if (num % 2 == 0) {
    document.write("The number is Even");
}
else {
    document.write("The number is Odd");
}
</script>

</body>
</html>
