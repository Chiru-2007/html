<!DOCTYPE html>
<html>
<head>
    <title>Image Gallery</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
        }

        h1{
            color: darkblue;
        }

        .gallery{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .gallery img{
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid black;
            box-shadow: 0px 4px 10px gray;
            transition: transform 0.3s;
        }

        .gallery img:hover{
            transform: scale(1.05);
        }
    </style>

</head>
<body>

<h1>Image Gallery</h1>

<div class="gallery">

    <img src="chennakeshava-temple.jpg" alt="Image 1">
    <img src="namada-chilume-tumkur-zoo-a8dun7npht-250.webp" alt="Image 2">
    <img src="tumkur.webp" alt="Image 3">
    <img src="places-to-visit-near-tumkur-road.webp" alt="Image 4">
    <img src="ARALAGUPPE_Banner-1.jpeg" alt="Image 5">
    <img src="cc_images.jpg" alt="Image 6">

</div>

</body>
</html>
