<!DOCTYPE html>
<html>
<head>
    <title>Image Text Overlay</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
        }

        .container{
            position: relative;
            width: 500px;
            margin: auto;
        }

        .container img{
            width: 100%;
            border-radius: 10px;
        }

        .text{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 30px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>

</head>
<body>

<h2>Image with Text Overlay</h2>

<div class="container">
    <img src="SIT-Tumkur.webp" alt="College Image">
    <div class="text">SIT Tumkur</div>
</div>

</body>
</html>
